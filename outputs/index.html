<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#F7F3EA">
  <title>משימות ישיבת בת עין</title>
  <style>
    :root {
      --bg: #F7F3EA;
      --surface: #FFFDF8;
      --surface-strong: #F2E8D8;
      --text: #2E2A24;
      --muted: #7A746A;
      --line: #E4DCCF;
      --accent: #566B4F;
      --accent-soft: #E8EDE2;
      --sand: #CDBB9D;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
      --outer-shell: #EAE4D8;
      --radius: 12px;
      font-family: "Heebo", "Assistant", "Rubik", "Noto Sans Hebrew", "Segoe UI", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #2F332F;
      --surface: #3A3F3A;
      --surface-strong: #444A44;
      --text: #ECE7DD;
      --muted: #B8B0A3;
      --line: rgba(255,255,255,.06);
      --accent: #A7F070;
      --accent-soft: rgba(167,240,112,.12);
      --sand: #8E7B5F;
      --outer-shell: #252A25;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--outer-shell);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 0;
    }
    [data-theme="dark"] body, body[data-theme="dark"] {
      background: var(--outer-shell);
    }
    button, input, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #FFFDF8 0%, #F3EEE5 100%);
      border-radius: 12px;
      padding: .78rem 1rem;
      cursor: pointer;
      min-height: 46px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72), 0 2px 8px rgba(0,0,0,.035);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }
    button:hover {
      border-color: color-mix(in srgb, var(--sand) 68%, var(--line));
    }
    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 1px 2px rgba(46,42,36,.08);
    }
    button.primary {
      background: linear-gradient(180deg, #6D8264 0%, #566B4F 100%);
      color: white;
      border-color: var(--accent);
      font-weight: 750;
    }
    button.soft {
      background: linear-gradient(180deg, #F4F6EF 0%, var(--accent-soft) 100%);
      border-color: color-mix(in srgb, var(--accent) 22%, var(--line));
      color: var(--accent);
      font-weight: 700;
    }
    button.icon {
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: .85rem;
      outline-color: var(--accent);
      box-shadow: inset 0 1px 2px rgba(46,42,36,.035);
    }
    textarea { min-height: 110px; resize: vertical; }
    .app-shell {
      width: min(calc(100% - 28px), 430px);
      margin: 0 auto;
      min-height: calc(100vh - 36px);
      padding: 18px 16px 112px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,0) 160px),
        linear-gradient(rgba(120,110,90,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,110,90,.04) 1px, transparent 1px),
        var(--surface);
      background-size: auto, 28px 28px, 28px 28px, auto;
      border: 1px solid color-mix(in srgb, var(--sand) 42%, var(--line));
      border-radius: 28px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.75),
        inset 0 0 0 8px rgba(234,228,216,.42),
        0 2px 8px rgba(0,0,0,.04);
      overflow: hidden;
      position: relative;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 8;
      margin: -18px -16px 18px;
      padding: 14px 18px 12px;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      min-width: 0;
    }
    .brand strong { font-size: .98rem; }
    .brand span { color: var(--muted); font-size: .8rem; }
    .role-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface);
      min-width: 142px;
    }
    .role-switch button {
      border: 0;
      border-radius: 0;
      padding: .52rem .65rem;
      min-height: 36px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
    }
    .role-switch button.active {
      background: var(--accent);
      color: #fff;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.65rem, 4.5vw, 2.15rem); letter-spacing: 0; font-weight: 760; }
    h2 { font-size: 1.08rem; margin-bottom: .75rem; font-weight: 720; }
    h3 { font-size: 1rem; margin-bottom: .48rem; }
    .muted { color: var(--muted); }
    .hero {
      padding: 22px 2px 16px;
    }
    .hero .count {
      margin-top: 14px;
      width: 74px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 2.1rem;
      font-weight: 760;
    }
    .section {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .task-group {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .task-group-title {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .task-group.highlight {
      border-top: 2px solid var(--sand);
    }
    .cards, .list, .mgmt-list {
      display: grid;
      gap: 8px;
    }
    .task-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      text-align: right;
      box-shadow: 0 2px 8px rgba(0,0,0,.035);
    }
    .task-card header, .list-row header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .category, .status-line, .person-line {
      color: var(--muted);
      font-size: .95rem;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-flex;
      width: fit-content;
      padding: .28rem .55rem;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-strong) 45%, var(--surface));
      color: var(--muted);
      font-size: .82rem;
      font-weight: 560;
    }
    .task-title {
      font-size: 1.04rem;
      font-weight: 760;
      margin: 8px 0;
    }
    .due {
      color: var(--muted);
      margin: 4px 0 0;
      font-size: .9rem;
    }
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-actions button { flex: 1; min-width: 112px; }
    .list-row, .mgmt-row {
      display: block;
      width: 100%;
      text-align: right;
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      border-radius: 0;
      padding: 0;
      min-height: 66px;
      box-shadow: none;
    }
    .list-row {
      position: relative;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      min-height: 68px;
    }
    .list-row-content {
      padding: 8px 18px 8px 76px;
      min-height: 68px;
    }
    .list-row.completed .list-row-content {
      padding-left: 18px;
    }
    .row-meta {
      display: flex;
      gap: 7px 10px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .88rem;
      margin-top: 3px;
      line-height: 1.4;
    }
    .row-meta .person-line,
    .row-meta .due {
      margin: 0;
      font-size: .88rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .priority-meta.high {
      color: color-mix(in srgb, var(--danger) 78%, var(--muted));
      font-weight: 620;
    }
    .list-row .task-title {
      margin: 1px 0 2px;
      font-size: 1rem;
    }
    .complete-row {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 66px;
      min-height: 100%;
      padding: .5rem .35rem;
      border: 0;
      border-right: 1px solid color-mix(in srgb, var(--status-done) 34%, var(--line));
      border-radius: 0;
      color: var(--status-done);
      background: color-mix(in srgb, var(--status-done) 13%, var(--surface));
      font-weight: 650;
      font-size: .84rem;
      z-index: 2;
      display: grid;
      place-content: center;
      gap: 7px;
      box-shadow: inset 1px 0 0 rgba(255,255,255,.42);
    }
    .complete-row .line-icon {
      width: 17px;
      height: 17px;
      margin-inline: auto;
    }
    .dot { font-size: .9rem; }
    .dot.progress { color: var(--status-progress); }
    .dot.done { color: var(--status-done); }
    .bottom-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(calc(100% - 50px), 398px);
      display: grid;
      gap: 2px;
      padding: 8px 10px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      border-inline: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,.65);
      z-index: 20;
    }
    .bottom-nav.manager { grid-template-columns: repeat(4, 1fr); }
    .bottom-nav.user { grid-template-columns: repeat(3, 1fr); }
    .bottom-nav button {
      border: 0;
      background: transparent;
      color: var(--muted);
      min-height: 54px;
      padding: 6px 3px;
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: .74rem;
      border-radius: var(--radius);
    }
    .bottom-nav button span:first-child { line-height: 0; }
    .bottom-nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.42);
    }
    .detail-head {
      display: grid;
      gap: 12px;
      padding-top: 6px;
    }
    .back {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border-color: transparent;
      padding-inline: 0;
      color: var(--muted);
    }
    .detail-title-row {
      display: flex;
      gap: 8px;
      align-items: start;
      justify-content: space-between;
    }
    .detail-title-row h1 {
      flex: 1;
      line-height: 1.2;
    }
    .detail-block {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .segmented button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    #createForm .segmented {
      gap: 6px;
      margin-top: 8px;
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-radius: 11px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    #createForm .segmented button {
      flex: 1;
      min-width: 82px;
      min-height: 34px;
      padding: .38rem .58rem;
      border-radius: 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 640;
      box-shadow: none;
    }
    #createForm .segmented button.active {
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
      border-color: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .updates {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }
    .update-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .management-tiles {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      box-shadow: 0 1px 4px rgba(0,0,0,.025);
    }
    .mgmt-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 54px;
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      padding: 9px 18px 9px 10px;
      text-align: right;
      box-shadow: none;
    }
    .mgmt-row:last-child {
      border-bottom: 0;
    }
    .section > .mgmt-row {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
    }
    .mgmt-row.create-row {
      min-height: 54px;
      padding: 9px 18px 9px 10px;
      border-radius: 10px;
    }
    .mgmt-row.create-row,
    .mgmt-row.wide[data-nav="create"] {
      border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--accent) 8%, var(--surface)) 0%, color-mix(in srgb, var(--surface) 88%, transparent) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.52), 0 1px 4px rgba(0,0,0,.025);
    }
    .mgmt-row.create-row strong {
      margin-bottom: 0;
    }
    .mgmt-row.create-row strong,
    .mgmt-row.wide[data-nav="create"] strong {
      color: var(--accent);
      font-weight: 780;
    }
    .mgmt-row strong {
      display: block;
      font-size: 1.02rem;
      margin-bottom: 0;
    }
    .mgmt-row .big {
      min-width: 38px;
      min-height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 20%, var(--line));
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      font-size: 1.02rem;
      font-weight: 760;
      color: var(--accent);
      direction: ltr;
      text-align: center;
    }
    .row-left-icon {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
      color: var(--accent);
    }
    .mgmt-row.create-row .row-left-icon,
    .mgmt-row.wide[data-nav="create"] .row-left-icon {
      border-color: color-mix(in srgb, var(--accent) 34%, var(--line));
      background: color-mix(in srgb, var(--accent) 12%, var(--surface));
    }
    .management-list {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      box-shadow: 0 1px 4px rgba(0,0,0,.025);
    }
    .management-list-row {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: 1fr 38px;
      align-items: center;
      gap: 14px;
      padding: 9px 18px 9px 10px;
      border: 0;
      border-radius: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      text-align: right;
      box-shadow: none;
    }
    .management-list-row:last-child {
      border-bottom: 0;
    }
    .management-list-row .name {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-weight: 620;
    }
    .management-list-row .icon-box {
      justify-self: end;
      width: 34px;
      height: 34px;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, var(--line));
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
    }
    #createForm {
      display: grid;
      gap: 0;
    }
    .prefs-line, .form-group {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }
    .form-group {
      padding: 14px 0;
    }
    .form-group h2 {
      margin-bottom: 8px;
      color: var(--text);
      font-size: .98rem;
      font-weight: 740;
    }
    #createForm input,
    #createForm textarea {
      min-height: 42px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border-color: color-mix(in srgb, var(--line) 82%, transparent);
      padding: .66rem .78rem;
      box-shadow: inset 0 1px 1px rgba(46,42,36,.025);
    }
    #createForm textarea {
      min-height: 86px;
    }
    .radio-grid, .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid color-mix(in srgb, var(--line) 82%, transparent);
      background: color-mix(in srgb, var(--surface) 56%, transparent);
      border-radius: 10px;
      padding: .48rem .68rem;
      min-height: 34px;
      cursor: pointer;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 620;
      box-shadow: none;
      transition: border-color .18s ease, background .18s ease, color .18s ease;
    }
    .chip:has(input:checked) {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 24%, var(--line));
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
    }
    .category-chip {
      display: inline-flex;
      align-items: stretch;
      gap: 4px;
    }
    .category-chip .chip {
      margin: 0;
    }
    .chip.delete-select {
      border-color: var(--line);
      color: var(--text);
      background: color-mix(in srgb, var(--surface) 56%, transparent);
      font-weight: 750;
    }
    .chip.delete-select.selected {
      border-color: var(--danger);
      outline: 1px solid color-mix(in srgb, var(--danger) 28%, transparent);
      outline-offset: 1px;
      background: color-mix(in srgb, var(--danger) 10%, var(--surface));
    }
    button.delete-category {
      min-height: 34px;
      padding: .42rem .66rem;
      border-radius: 10px;
      border-color: color-mix(in srgb, var(--danger) 65%, var(--line));
      color: var(--danger);
      background: color-mix(in srgb, var(--danger) 7%, var(--surface));
      font-size: .88rem;
      font-weight: 760;
      box-shadow: none;
    }
    button.add-inline {
      min-height: 34px;
      padding: .42rem .66rem;
      border-radius: 10px;
      border-color: color-mix(in srgb, var(--accent) 42%, var(--line));
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 7%, var(--surface));
      font-size: .88rem;
      font-weight: 760;
      box-shadow: none;
    }
    .add-panel {
      margin-top: 10px;
      padding: 8px;
      border: 1px solid color-mix(in srgb, var(--accent) 26%, var(--line));
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 6%, var(--surface));
      box-shadow: none;
    }
    #createForm .quick-actions.add-panel {
      align-items: center;
      gap: 6px;
    }
    #createForm .quick-actions.add-panel input {
      flex: 1 1 150px;
    }
    #createForm .quick-actions.add-panel button {
      min-height: 38px;
      padding: .5rem .7rem;
      box-shadow: none;
    }
    #createForm > button.primary[type="submit"] {
      margin-top: 14px;
      min-height: 48px;
      border-radius: 12px;
    }
    .sort-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-radius: 11px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    .sort-bar button {
      flex: 1;
      min-width: 86px;
      min-height: 34px;
      padding: .38rem .58rem;
      border-radius: 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 640;
      box-shadow: none;
    }
    .sort-bar button.active {
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
      border-color: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);

          <div class="list">${todayTasks.length ? todayTasks.map(t => listRow(t, showOwner)).join("") : `<div class="empty">אין משימות להיום.</div>`}</div>
        </section>
        <section class="task-group">
          <h2 class="task-group-title">שאר המשימות</h2>
          <div class="list">${otherTasks.length ? otherTasks.map(t => listRow(t, showOwner)).join("") : `<div class="empty">אין משימות נוספות.</div>`}</div>
        </section>
        ${state.role === "user" ? `<section class="section"><button class="mgmt-row wide" data-nav="create"><span><strong>יצירת משימה חדשה</strong><span class="muted">הוספה מהירה למשימות שלי</span></span><span class="row-left-icon">${lineIcon("add")}</span></button></section>` : ""}`;
    }
    function taskCard(t) {
      const c = cat(t.category), s = statusMeta[t.status];
      return `
        <article class="task-card" data-open="${t.id}">
          <header>
            <span class="status-line status-badge">${lineIcon(s.icon)} ${s.label}</span>
            <span class="category">${lineIcon(c.icon)} ${c.label}</span>
          </header>
          <div class="task-title">${t.title}</div>
          <div class="due">יעד: ${t.dueLabel}</div>
          <div class="quick-actions">
            <button class="primary" data-status="${t.id}:done">סמן כהושלם</button>
          </div>
        </article>`;
    }
    function sortTasks(tasks) {
      const dueOrder = { today: 0, tomorrow: 1, date: 2, done: 3 };
      return [...tasks].sort((a, b) => {
        if (state.allSort === "category") {
          return cat(a.category).label.localeCompare(cat(b.category).label, "he") || dueOrder[a.due] - dueOrder[b.due] || a.title.localeCompare(b.title, "he");
        }
        if (state.allSort === "owner") {
          return a.owner.localeCompare(b.owner, "he") || dueOrder[a.due] - dueOrder[b.due] || a.title.localeCompare(b.title, "he");
        }
        return dueOrder[a.due] - dueOrder[b.due] || a.dueLabel.localeCompare(b.dueLabel, "he") || a.title.localeCompare(b.title, "he");
      });
    }
    function sortControls() {
      const labels = state.role === "manager"
        ? [["date", "לפי תאריך"], ["category", "לפי קטגוריה"], ["owner", "לפי מבצע"]]
        : [["date", "לפי תאריך"], ["category", "לפי קטגוריה"]];
      return `<div class="sort-bar" aria-label="אפשרויות מיון">${labels.map(([key, label]) => `<button data-sort="${key}" class="${state.allSort === key ? "active" : ""}">${label}</button>`).join("")}</div>`;
    }
    function listScreen(title, tasks, showOwner, subtitle = "", sortable = false, showCreate = false) {

        <section class="hero">
          ${state.role === "manager" && state.view !== "all" && state.view !== "done" ? `<button class="back" data-nav="management">${lineIcon("back")} חזרה</button>` : ""}

          ${subtitle ? `<p class="muted">${subtitle}</p>` : ""}
          ${sortable ? sortControls() : ""}
        </section>
        <section class="list">
          ${tasks.length ? tasks.map(t => listRow(t, showOwner)).join("") : `<div class="empty">אין משימות להצגה.</div>`}
        </section>
        ${showCreate ? `<section class="section"><button class="mgmt-row wide" data-nav="create"><span><strong>יצירת משימה חדשה</strong><span class="muted">הוספה מהירה למשימות שלי</span></span><span class="row-left-icon">${lineIcon("add")}</span></button></section>` : ""}`;
    }
    function listRow(t, showOwner) {
      const c = cat(t.category), s = statusMeta[t.status];

        <div class="list-row ${t.status === "done" ? "completed" : ""}" data-open="${t.id}" role="button" tabindex="0">

            <div class="category">${lineIcon(c.icon)} ${c.label}</div>
            <div class="task-title"><span class="dot ${s.dot}">${lineIcon(s.icon)}</span> ${t.title}</div>
            <div class="row-meta">
              <span class="status-line status-badge">${lineIcon(s.icon)} ${s.label}</span>
              <span class="priority-meta ${t.priority === "high" ? "high" : ""}">עדיפות ${priorityLabel(t.priority)}</span>
              ${showOwner ? `<span class="person-line">${lineIcon("user")} ${t.owner}</span>` : ""}
              <span class="due">${t.dueLabel}</span>
            </div>
          </div>
          ${t.status !== "done" ? `<button class="complete-row" type="button" data-status="${t.id}:done">${lineIcon("done")} הושלם</button>` : ""}
        </div>`;
    }
    function detailScreen(id) {
      const t = state.tasks.find(x => x.id === id);

      const titleBlock = state.editingTitle
        ? `<input id="titleInput" value="${escapeHtml(t.title)}"><div class="quick-actions"><button class="primary" id="saveTitle">שמור</button><button id="cancelTitle">ביטול</button></div>`

        ? `<textarea id="notesInput">${escapeHtml(t.notes)}</textarea><div class="quick-actions"><button class="primary" id="saveNotes">שמור</button><button id="cancelNotes">ביטול</button></div>`
        : `<p>${t.notes || "אין הערות."}</p><button class="soft" id="editNotes">ערוך</button>`;
      return `
        <section class="detail-head">
          <button class="back" data-nav="${state.lastList || "today"}">${lineIcon("back")} חזרה</button>
          <div class="category">${lineIcon(c.icon)} ${c.label}</div>
          ${titleBlock}
        </section>
        <section class="detail-block">
          <h2>סטטוס</h2>
          <p class="status-line status-badge">${lineIcon(s.icon)} ${s.label}</p>
          <div class="segmented">${statusButtons.map(([key,label]) => `<button data-status="${t.id}:${key}" class="${t.status === key ? "active" : ""}">${label}</button>`).join("")}</div>
          <p class="muted" style="margin-top:10px;">עדיפות: ${priorityLabel(t.priority)}</p>
        </section>
        <section class="detail-block">
          <h2>יעד</h2>
          <p>${t.dueLabel}</p>
          <div class="segmented">
            <button data-tomorrow="${t.id}">העבר למחר</button>
            <button id="pickDate">שנה תאריך</button>
          </div>
          <div id="dateChooser" style="display:none; margin-top:10px;">
            <input id="dateInput" type="date">
            <div class="quick-actions"><button class="primary" id="saveDate">שמור תאריך</button></div>
          </div>
        </section>
        <section class="detail-block">
          <h2>נוצר</h2>
          <p class="muted">${t.createdLabel || "ראשון · 12 יוני"}</p>

        <section class="detail-block">
          <h2>הערות</h2>
          ${notesBlock}

        <section class="detail-block">
          <h2>עדכונים</h2>
          <div class="updates">
            ${t.updates.length ? t.updates.map(u => `<div class="update-item"><strong>${u.by}:</strong><br>${u.text}</div>`).join("") : `<p class="muted">אין עדכונים עדיין.</p>`}
          </div>
          <button class="soft" id="addUpdate" style="margin-top:10px;">+ עדכון</button>
        </section>`;
    }
    function managementScreen() {
      const progress = state.tasks.filter(t => t.status === "progress").length;
      const done = state.tasks.filter(t => t.status === "done").length;
      return `
        <section class="hero">
          <h1>ניהול</h1>
        </section>
        <section class="management-tiles">
          <button class="mgmt-row" data-nav="filter:progress"><strong>משימות בתהליך</strong><div class="big">${progress}</div></button>
          <button class="mgmt-row" data-nav="done"><strong>משימות שהושלמו</strong><div class="big">${done}</div></button>
        </section>
        <section class="section">
          <h2>קטגוריות</h2>
          <div class="management-list">${categories.slice(0,5).map(c => `<button class="management-list-row" data-nav="category:${c.id}"><span class="name">${c.label}</span><span class="icon-box">${lineIcon(c.icon)}</span></button>`).join("")}</div>
        </section>
        <section class="section">
          <h2>מבצעים</h2>
          <div class="management-list">${people.map(p => `<button class="management-list-row" data-nav="person:${encodeURIComponent(p)}"><span class="name">${p}</span><span class="icon-box">${lineIcon("user")}</span></button>`).join("")}</div>
        </section>
        <section class="section">
          <button class="mgmt-row create-row" data-nav="create"><strong>יצירת משימה חדשה</strong><span class="row-left-icon">${lineIcon("add")}</span></button>
        </section>`;
    }
    function prefsScreen() {
      const clearPrompt = state.clearAllStep === 0
        ? { text: "נקה את כל המשימות.", detail: "פעולה זו מוחקת את כל המשימות.", cls: "" }
        : state.clearAllStep === 1
          ? { text: "כן, אני בטוח. המשך.", detail: "אישור ראשון התקבל. צריך אישור נוסף.", cls: "" }
          : { text: "אישור אחרון: מחק הכל.", detail: "זה האישור השני והסופי.", cls: " final" };
      return `
        <section class="hero"><h1>העדפות</h1></section>
        <section class="prefs-line">
          <h2>מצב תצוגה</h2>
          <div class="segmented">
            <button type="button" data-theme-choice="light" class="${state.prefs.dark ? "" : "active"}">מצב בהיר</button>
            <button type="button" data-theme-choice="dark" class="${state.prefs.dark ? "active" : ""}">מצב כהה</button>
          </div>
        </section>
        ${state.role === "manager" ? `<section class="prefs-line danger-zone">
          <h2>ניקוי משימות</h2>
          <p>${clearPrompt.detail}</p>
          <button class="danger${clearPrompt.cls}" id="clearAllTasks" type="button">${clearPrompt.text}</button>
        </section>` : ""}`;
    }
    function categoryPickerMarkup() {
      const categoryItems = categories.map((c, i) => {
        if (state.deletingCategory) {
          const selected = state.categoriesToDelete.includes(c.id) ? " selected" : "";
          return `<button class="chip delete-select${selected}" type="button" data-mark-delete-category="${c.id}">${lineIcon(c.icon)} ${c.label}</button>`;
        }
        return `<label class="chip"><input name="category" type="radio" value="${c.id}" ${i===0 ? "checked" : ""}> ${lineIcon(c.icon)} ${c.label}</label>`;
      }).join("");
      const canManageCategories = state.role === "manager";
      const deleteButton = canManageCategories && categories.length ? `<button class="delete-category" type="button" id="startDeleteCategory">${state.deletingCategory ? "ביטול מחיקה" : "מחק קטגוריה"}</button>` : "";
      const confirm = state.deletingCategory && state.categoriesToDelete.length
        ? `<div class="quick-actions" style="margin-top:10px;"><button class="danger final" type="button" id="confirmDeleteCategory">אשר מחיקה (${state.categoriesToDelete.length})</button><button type="button" id="cancelDeleteCategory">ביטול</button></div>`
        : "";
      const help = state.deletingCategory
        ? `<p class="muted" style="margin-top:10px; color: var(--danger);">בחר קטגוריה אחת או יותר למחיקה. רק המסומנות במסגרת אדומה יימחקו.</p>`
        : "";
      return `
        <div class="chips">${categoryItems}${canManageCategories ? `<button class="add-inline" type="button" id="showCategoryInput">הוספת קטגוריה +</button>` : ""}${deleteButton}</div>
        ${help}
        ${confirm}`;
    }
    function peoplePickerMarkup() {
      const items = people.map((person, i) => {
        if (state.deletingPerson) {
          const selected = state.peopleToDelete.includes(person) ? " selected" : "";
          return `<button class="chip delete-select${selected}" type="button" data-mark-delete-person="${person}">${lineIcon("user")} ${person}</button>`;
        }
        return `<label class="chip"><input name="owner" type="checkbox" value="${person}" ${i===0 ? "checked" : ""}> ${person}</label>`;
      }).join("");
      const deleteButton = people.length ? `<button class="delete-category" type="button" id="startDeletePerson">${state.deletingPerson ? "ביטול מחיקה" : "מחק מבצע"}</button>` : "";
      const confirm = state.deletingPerson && state.peopleToDelete.length
        ? `<div class="quick-actions" style="margin-top:10px;"><button class="danger final" type="button" id="confirmDeletePerson">אשר מחיקה (${state.peopleToDelete.length})</button><button type="button" id="cancelDeletePerson">ביטול</button></div>`
        : "";
      const help = state.deletingPerson
        ? `<p class="muted" style="margin-top:10px; color: var(--danger);">בחר מבצע אחד או יותר למחיקה. רק המסומנים במסגרת אדומה יימחקו.</p>`
        : "";
      return `
        <div class="chips">${items}<button class="add-inline" type="button" id="showPersonInput">הוספת מבצע +</button>${deleteButton}</div>
        ${help}
        ${confirm}`;
    }
    function createScreen() {
      return `
        <section class="hero">
          <button class="back" data-nav="${state.role === "manager" ? "management" : "all"}">${lineIcon("back")} חזרה</button>
          <h1>משימה חדשה</h1>
        </section>
        <form id="createForm">
          <div class="form-group"><h2>כותרת</h2><input id="newTitle" required placeholder="מה צריך לעשות?"></div>
          <div class="form-group">
            <h2>קטגוריה</h2>
            ${categoryPickerMarkup()}
            ${categories.length ? "" : `<p class="muted" style="margin-top:10px;">אין קטגוריות כרגע. אפשר ליצור משימה ללא קטגוריה או להוסיף קטגוריה חדשה.</p>`}
            ${state.addingCategory ? `<div class="quick-actions add-panel"><input id="newCategoryName" placeholder="שם קטגוריה"><button class="primary" type="button" id="saveCategory">שמור קטגוריה</button><button type="button" id="cancelCategory">ביטול</button></div>` : ""}
          </div>
          ${state.role === "manager" ? `<div class="form-group"><h2>מבצע/ים</h2>${peoplePickerMarkup()}${people.length ? "" : `<p class="muted" style="margin-top:10px;">אין מבצעים כרגע. אפשר ליצור משימה ללא מבצע או להוסיף מבצע חדש.</p>`}${state.addingPerson ? `<div class="quick-actions add-panel"><input id="newPersonName" placeholder="שם מבצע"><button class="primary" type="button" id="savePerson">שמור מבצע</button><button type="button" id="cancelPerson">ביטול</button></div>` : ""}</div>` : ""}
          <div class="form-group"><h2>יעד</h2><div class="segmented"><button type="button" data-due-choice="today" class="active">היום</button><button type="button" data-due-choice="tomorrow">מחר</button><button type="button" data-due-choice="date">בחר תאריך</button></div><input id="newDate" type="date" style="display:none; margin-top:10px;"></div>
          <div class="form-group"><h2>עדיפות</h2><div class="chips"><label class="chip"><input name="priority" type="radio" value="normal" checked> רגילה</label><label class="chip"><input name="priority" type="radio" value="high"> גבוהה</label></div></div>
          <div class="form-group"><h2>הערות</h2><textarea id="newNotes" placeholder="פרטים קצרים"></textarea></div>
          <button class="primary" type="submit" style="width:100%;">צור משימה</button>
        </form>`;
    }
    function renderNav() {
      const items = state.role === "manager"
        ? [["management","ניהול","settings"],["all","משימות פתוחות","list"],["done","הושלם","done"],["prefs","העדפות","preferences"]]
        : [["all","משימות פתוחות","list"],["done","הושלם","done"],["prefs","העדפות","preferences"]];
      const nav = $("bottomNav");
      nav.className = `bottom-nav ${state.role === "manager" ? "manager" : "user"}`;
      nav.innerHTML = items.map(([view,label,iconName]) => `<button data-nav="${view}" class="${state.view === view ? "active" : ""}"><span>${lineIcon(iconName)}</span><span>${label}</span></button>`).join("");
    }
    function bindPage() {
      document.querySelectorAll("[data-nav]").forEach(el => el.addEventListener("click", e => navigate(e.currentTarget.dataset.nav)));
      document.querySelectorAll("[data-sort]").forEach(el => el.addEventListener("click", e => {
        state.allSort = e.currentTarget.dataset.sort;
        render();
      }));
      document.querySelectorAll("[data-open]").forEach(el => el.addEventListener("click", e => {
        if (e.target.closest("[data-status]")) return;
        navigate(`task:${e.currentTarget.dataset.open}`);
      }));
      document.querySelectorAll("[data-open]").forEach(el => el.addEventListener("keydown", e => {
        if (e.key !== "Enter" && e.key !== " ") return;
        e.preventDefault();
        navigate(`task:${e.currentTarget.dataset.open}`);
      }));
      document.querySelectorAll("[data-status]").forEach(el => el.addEventListener("click", e => {
        e.stopPropagation();
        const [id, status] = e.currentTarget.dataset.status.split(":");
        const task = state.tasks.find(t => t.id === id);
        updateTask(id, {
          status,
          due: status === "done" ? "done" : task.due === "done" ? "today" : task.due,
          dueLabel: status === "done" ? "הושלם · היום" : task.due === "done" ? "היום · שלישי" : task.dueLabel
        });
        toast(status === "done" ? "המשימה סומנה כהושלמה" : "הסטטוס עודכן");
      }));
      document.querySelectorAll("[data-tomorrow]").forEach(el => el.addEventListener("click", e => {
        updateTask(e.currentTarget.dataset.tomorrow, { due: "tomorrow", dueLabel: "מחר · רביעי" });
        toast("היעד עבר למחר");
      }));
      $("editNotes")?.addEventListener("click", () => { state.editingNotes = true; render(); });
      $("cancelNotes")?.addEventListener("click", () => { state.editingNotes = false; render(); });
      $("saveNotes")?.addEventListener("click", () => {
        const id = state.view.split(":")[1];
        state.editingNotes = false;
        updateTask(id, { notes: $("notesInput").value });
        toast("ההערות נשמרו");
      });
      $("editTitle")?.addEventListener("click", () => { state.editingTitle = true; render(); });
      $("cancelTitle")?.addEventListener("click", () => { state.editingTitle = false; render(); });
      $("saveTitle")?.addEventListener("click", () => {
        const id = state.view.split(":")[1];
        state.editingTitle = false;
        updateTask(id, { title: $("titleInput").value || "משימה ללא כותרת" });
        toast("שם המשימה נשמר");
      });
      $("pickDate")?.addEventListener("click", () => { $("dateChooser").style.display = "block"; });
      $("saveDate")?.addEventListener("click", () => {
        const input = $("dateInput").value;
        const id = state.view.split(":")[1];
        if (!input) return toast("בחר תאריך");
        updateTask(id, { due: "date", dueLabel: formatHebrewDate(input) });
        toast("התאריך עודכן");
      });
      $("addUpdate")?.addEventListener("click", () => {
        const id = state.view.split(":")[1];
        const t = state.tasks.find(x => x.id === id);
        updateTask(id, { updates: [...t.updates, { by: state.role === "manager" ? "צבי" : "עדינה", text: "עדכון מהיר נוסף" }] });
        toast("נוסף עדכון");
      });
      document.querySelectorAll("[data-theme-choice]").forEach(btn => btn.addEventListener("click", e => {
        state.prefs.dark = e.currentTarget.dataset.themeChoice === "dark";
        document.body.dataset.theme = state.prefs.dark ? "dark" : "";
        save();
        render();
      }));
      $("clearAllTasks")?.addEventListener("click", () => {
        if (state.clearAllStep < 2) {
          state.clearAllStep += 1;
          render();
          return;
        }
        state.tasks = [];
        state.clearAllStep = 0;
        save();
        render();
        toast("כל המשימות נמחקו");
      });
      $("showCategoryInput")?.addEventListener("click", () => {
        state.addingCategory = true;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      $("cancelCategory")?.addEventListener("click", () => {
        state.addingCategory = false;
        render();
      });
      $("saveCategory")?.addEventListener("click", () => {
        const name = $("newCategoryName").value.trim();
        if (!name) return toast("כתוב שם קטגוריה");
        const category = { id: `custom-${Date.now()}`, label: name, icon: "office" };
        const custom = JSON.parse(localStorage.getItem("beit-categories") || "[]");
        custom.push(category);
        localStorage.setItem("beit-categories", JSON.stringify(custom));
        categories = loadCategories();
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
        setTimeout(() => {
          const input = document.querySelector(`input[name="category"][value="${category.id}"]`);
          if (input) input.checked = true;
        }, 0);
        toast("הקטגוריה נוספה");
      });
      $("startDeleteCategory")?.addEventListener("click", () => {
        state.deletingCategory = !state.deletingCategory;
        state.categoriesToDelete = [];
        state.addingCategory = false;
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      document.querySelectorAll("[data-mark-delete-category]").forEach(btn => btn.addEventListener("click", e => {
        const id = e.currentTarget.dataset.markDeleteCategory;
        state.categoriesToDelete = state.categoriesToDelete.includes(id)
          ? state.categoriesToDelete.filter(categoryId => categoryId !== id)
          : [...state.categoriesToDelete, id];
        render();
      }));
      $("cancelDeleteCategory")?.addEventListener("click", () => {
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      $("confirmDeleteCategory")?.addEventListener("click", () => {
        const ids = state.categoriesToDelete;
        if (!ids.length) return;
        const hidden = JSON.parse(localStorage.getItem("beit-hidden-categories") || "[]");
        ids.filter(id => baseCategories.some(c => c.id === id)).forEach(id => {
          if (!hidden.includes(id)) hidden.push(id);
        });
        localStorage.setItem("beit-hidden-categories", JSON.stringify(hidden));
        const custom = JSON.parse(localStorage.getItem("beit-categories") || "[]").filter(c => !ids.includes(c.id));
        localStorage.setItem("beit-categories", JSON.stringify(custom));
        categories = loadCategories();
        const fallbackCategory = categories[0]?.id || "uncategorized";
        state.tasks = state.tasks.map(t => ids.includes(t.category) ? { ...t, category: fallbackCategory } : t);
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        save();
        render();
        toast(ids.length === 1 ? "הקטגוריה נמחקה" : "הקטגוריות נמחקו");
      });
      $("showPersonInput")?.addEventListener("click", () => {
        state.addingPerson = true;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      $("cancelPerson")?.addEventListener("click", () => {
        state.addingPerson = false;
        render();
      });
      $("savePerson")?.addEventListener("click", () => {
        const name = $("newPersonName").value.trim();
        if (!name) return toast("כתוב שם מבצע");
        const custom = JSON.parse(localStorage.getItem("beit-people") || "[]");
        if (![...basePeople, ...custom].includes(name)) custom.push(name);
        localStorage.setItem("beit-people", JSON.stringify(custom));
        people = loadPeople();
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
        setTimeout(() => {
          const input = document.querySelector(`input[name="owner"][value="${name}"]`);
          if (input) input.checked = true;
        }, 0);
        toast("המבצע נוסף");
      });
      $("startDeletePerson")?.addEventListener("click", () => {
        state.deletingPerson = !state.deletingPerson;
        state.peopleToDelete = [];
        state.addingPerson = false;
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      document.querySelectorAll("[data-mark-delete-person]").forEach(btn => btn.addEventListener("click", e => {
        const person = e.currentTarget.dataset.markDeletePerson;
        state.peopleToDelete = state.peopleToDelete.includes(person)
          ? state.peopleToDelete.filter(item => item !== person)
          : [...state.peopleToDelete, person];
        render();
      }));
      $("cancelDeletePerson")?.addEventListener("click", () => {
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      $("confirmDeletePerson")?.addEventListener("click", () => {
        const names = state.peopleToDelete;
        if (!names.length) return;
        const hidden = JSON.parse(localStorage.getItem("beit-hidden-people") || "[]");
        names.filter(name => basePeople.includes(name)).forEach(name => {
          if (!hidden.includes(name)) hidden.push(name);
        });
        localStorage.setItem("beit-hidden-people", JSON.stringify(hidden));
        const custom = JSON.parse(localStorage.getItem("beit-people") || "[]").filter(name => !names.includes(name));
        localStorage.setItem("beit-people", JSON.stringify(custom));
        people = loadPeople();
        const fallbackOwner = people[0] || "ללא מבצע";
        state.tasks = state.tasks.map(t => names.includes(t.owner) ? { ...t, owner: fallbackOwner } : t);
        state.deletingPerson = false;
        state.peopleToDelete = [];
        save();
        render();
        toast(names.length === 1 ? "המבצע נמחק" : "המבצעים נמחקו");
      });
      document.querySelectorAll("[data-due-choice]").forEach(btn => btn.addEventListener("click", e => {
        document.querySelectorAll("[data-due-choice]").forEach(b => b.classList.remove("active"));
        e.currentTarget.classList.add("active");
        $("newDate").style.display = e.currentTarget.dataset.dueChoice === "date" ? "block" : "none";
      }));
      $("createForm")?.addEventListener("submit", e => {
        e.preventDefault();
        const form = e.currentTarget;
        const owners = [...form.querySelectorAll("input[name='owner']:checked")].map(x => x.value);
        const owner = state.role === "manager" ? (owners[0] || people[0] || "ללא מבצע") : "עדינה";
        const dueChoice = document.querySelector("[data-due-choice].active").dataset.dueChoice;
        const dueLabel = dueChoice === "today" ? "היום · שלישי" : dueChoice === "tomorrow" ? "מחר · רביעי" : formatHebrewDate($("newDate").value);
        const task = {
          id: `t${Date.now()}`,
          title: $("newTitle").value,
          category: form.category?.value || "uncategorized",
          owner,
          due: dueChoice,
          dueLabel,
          status: "progress",
          priority: form.priority?.value || "normal",
          createdLabel: "ראשון · 12 יוני",
          notes: $("newNotes").value,
          updates: []
        };
        state.tasks = [task, ...state.tasks];
        save();
        toast("המשימה נוצרה");
        navigate(`task:${task.id}`);
      });
    }
    function formatHebrewDate(value) {
      if (!value) return "שני · 14 יוני";
      const date = new Date(value + "T12:00:00");
      const days = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
      const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
      return `${days[date.getDay()]} · ${date.getDate()} ${months[date.getMonth()]}`;
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[ch]));
    }
    $("userMode").addEventListener("click", () => { if (!lockedRole) { state.role = "user"; save(); navigate("today"); } });
    $("managerMode").addEventListener("click", () => { if (!lockedRole) { state.role = "manager"; save(); navigate("management"); } });
    window.addEventListener("hashchange", () => { state.view = location.hash.replace("#", "") || (state.role === "manager" ? "management" : "today"); render(); });
    if (!location.hash) location.hash = state.role === "manager" ? "management" : "today";
    render();
  </script>
</body>
</html>
