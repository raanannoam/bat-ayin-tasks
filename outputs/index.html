<!doctype html>
<html lang="he" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#566B4F">
  <meta name="background-color" content="#F7F3EA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="משימות ישיבה">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>משימות ישיבת בת עין</title>
  <script>
    // מעבר מ-localhost ל-production — שומר query (OAuth code) כדי לא להיתקע על 127.0.0.1
    (function () {
      var host = location.hostname;
      if (host !== "127.0.0.1" && host !== "localhost") return;
      var search = location.search || "";
      if (search.includes("debugBackend=local") || search.includes("debugBackend=supabase") || search.includes("debug=1")) return;
      var prod = "https://bat-ayin-tasks.vercel.app/index.html";
      location.replace(prod + search + location.hash);
    })();
    // ניקוי SW לפני OAuth callback — קריטי באנדרואיד (PKCE נשמר ב-localStorage)
    window.__authBoot = (function () {
      const query = new URLSearchParams(location.search);
      const isOAuthReturn = query.has("code") || query.has("error") || query.has("error_description");
      if (!isOAuthReturn || !("serviceWorker" in navigator)) return Promise.resolve();
      return navigator.serviceWorker.getRegistrations().then((regs) =>
        Promise.all(regs.map((reg) => reg.unregister()))
      );
    })();
  </script>
  <style>
    :root {
      --bg: #F7F3EA;
      --surface: #FFFDF8;
      --surface-strong: #F2E8D8;
      --text: #2E2A24;
      --muted: #6E6860;
      --line: #E4DCCF;
      --accent: #566B4F;
      --accent-soft: #E8EDE2;
      --sand: #CDBB9D;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
      --outer-shell: #EAE4D8;
      --radius: 12px;
      --leading-body: 1.45;
      --leading-tight: 1.3;
      --weight-title: 600;
      --weight-emphasis: 600;
      --weight-strong: 700;
      font-family: "Heebo", "Assistant", "Rubik", "Noto Sans Hebrew", "Segoe UI", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #2F332F;
      --surface: #3A3F3A;
      --surface-strong: #444A44;
      --text: #ECE7DD;
      --muted: #B8B0A3;
      --line: rgba(255, 255, 255, .06);
      --accent: #A7F070;
      --accent-soft: rgba(167, 240, 112, .12);
      --sand: #8E7B5F;
      --outer-shell: #252A25;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--outer-shell);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 0;
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
    }

    [data-theme="dark"] body,
    body[data-theme="dark"] {
      background: var(--outer-shell);
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: 12px;
      padding: .78rem 1rem;
      cursor: pointer;
      min-height: 46px;
      box-shadow: none;
      transition: background .18s ease, border-color .18s ease, color .18s ease;
    }

    button:hover {
      border-color: color-mix(in srgb, var(--sand) 68%, var(--line));
      background: color-mix(in srgb, var(--surface-strong) 35%, var(--surface));
    }

    button:active {
      background: color-mix(in srgb, var(--surface-strong) 55%, var(--surface));
    }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: var(--weight-emphasis);
    }

    button.primary:hover {
      background: color-mix(in srgb, var(--accent) 88%, #000);
      border-color: color-mix(in srgb, var(--accent) 88%, #000);
    }

    button.soft {
      background: var(--accent-soft);
      border-color: color-mix(in srgb, var(--accent) 22%, var(--line));
      color: var(--accent);
      font-weight: var(--weight-emphasis);
    }

    button.icon {
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: .85rem;
      outline-color: var(--accent);
      box-shadow: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .app-shell {
      width: min(calc(100% - 28px), 430px);
      margin: 0 auto;
      min-height: calc(100vh - 36px);
      padding:
        calc(18px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px)) calc(112px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px));
      background: var(--surface);
      border: 1px solid color-mix(in srgb, var(--sand) 28%, var(--line));
      border-radius: 28px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .04);
      overflow: hidden;
      position: relative;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 8;
      margin: -18px -16px 18px;
      padding: 14px 18px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      box-shadow: none;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      min-width: 0;
    }

    .brand strong {
      font-size: .98rem;
    }

    .brand span {
      color: var(--muted);
      font-size: .8rem;
    }

    .mockup-notice {
      margin: -8px 0 14px;
      padding: 7px 10px;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 9px;
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.35;
      text-align: center;
    }

    .offline-banner {
      display: none;
      margin: -8px 0 10px;
      padding: 8px 10px;
      border-radius: 9px;
      border: 1px solid color-mix(in srgb, var(--danger, #b42318) 35%, var(--line));
      background: color-mix(in srgb, var(--danger, #b42318) 8%, var(--surface));
      color: var(--muted);
      font-size: .78rem;
      text-align: center;
    }

    .offline-banner.show {
      display: block;
    }

    .auth-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .auth-actions button {
      font-size: .74rem;
      padding: .45rem .65rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      cursor: pointer;
    }

    .auth-actions button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .login-screen,
    .gate-screen {
      padding: 28px 8px;
      text-align: center;
    }

    .login-screen h2,
    .gate-screen h2 {
      margin-bottom: .75rem;
    }

    .login-screen p,
    .gate-screen p {
      color: var(--muted);
      margin-bottom: 1rem;
      line-height: 1.45;
    }

    .pilot-notice {
      margin: -8px 0 14px;
      padding: 7px 10px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line));
      border-radius: 9px;
      background: color-mix(in srgb, var(--accent) 6%, var(--surface));
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.35;
      text-align: center;
    }

    .app-loading {
      padding: 28px 8px;
      text-align: center;
      color: var(--muted);
      font-size: .92rem;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.65rem, 4.5vw, 2.15rem);
      letter-spacing: 0;
      font-weight: var(--weight-title);
      line-height: var(--leading-tight);
    }

    h2 {
      font-size: 1.08rem;
      margin-bottom: .75rem;
      font-weight: var(--weight-title);
      line-height: var(--leading-tight);
    }

    h3 {
      font-size: 1rem;
      margin-bottom: .48rem;
      font-weight: var(--weight-emphasis);
      line-height: var(--leading-tight);
    }

    .muted {
      color: var(--muted);
    }

    .hero {
      position: relative;
      padding: 24px 2px 18px;
    }

    .hero:has(.back),
    .detail-head:has(.back) {
      padding-inline-start: 44px;
    }

    .screen-title {
      color: var(--muted);
      font-size: .92rem;
      font-weight: var(--weight-emphasis);
      line-height: var(--leading-tight);
    }

    .screen-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: .9rem;
      line-height: var(--leading-body);
    }

    .hero .count {
      margin-top: 14px;
      width: 74px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 2.1rem;
      font-weight: var(--weight-strong);
    }

    .section {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .task-group {
      padding: 16px 0;
      border-top: 1px solid var(--line);
    }

    .task-group-title {
      font-size: .95rem;
      color: var(--muted);
      font-weight: var(--weight-emphasis);
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }

    .task-group-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      padding: 0 18px;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-align: right;
    }

    .task-group-toggle .task-group-title {
      margin-bottom: 0;
    }

    .task-group-chevron {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      border-radius: 8px;
      color: var(--muted);
    }

    .task-group-chevron .line-icon {
      width: 14px;
      height: 14px;
      transition: transform .18s ease;
    }

    .task-group.is-open .task-group-chevron .line-icon {
      transform: rotate(180deg);
    }

    .supplier-done-hint {
      margin: 0 18px 10px;
      font-size: .82rem;
    }

    .supplier-done-archive-btn {
      margin: 8px 18px 0;
    }

    .list-group {
      padding-top: 10px;
    }

    .list-group+.list-group {
      margin-top: 18px;
    }

    .list-group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 18px 10px;
      color: var(--muted);
      font-size: .9rem;
      font-weight: var(--weight-emphasis);
    }

    .list-group-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: color-mix(in srgb, var(--line) 82%, transparent);
    }

    .list-subgroup {
      margin: 0 0 14px;
    }

    .list-subgroup:last-child {
      margin-bottom: 0;
    }

    .list-subgroup-title {
      margin: 0 24px 8px;
      color: color-mix(in srgb, var(--muted) 88%, var(--text));
      font-size: .82rem;
      font-weight: var(--weight-emphasis);
    }

    .task-group.highlight {
      border-top: 2px solid var(--sand);
    }

    .cards,
    .list,
    .mgmt-list {
      display: grid;
      gap: 8px;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      text-align: right;
      box-shadow: none;
    }

    .task-card header,
    .list-row header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .category,
    .status-line,
    .person-line {
      color: var(--muted);
      font-size: .95rem;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status-badge {
      display: inline-flex;
      width: fit-content;
      padding: .28rem .55rem;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 500;
    }

    .task-title {
      font-size: 1.02rem;
      font-weight: var(--weight-emphasis);
      margin: 8px 0;
      line-height: var(--leading-tight);
    }

    .due {
      color: var(--muted);
      margin: 4px 0 0;
      font-size: .9rem;
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-actions button {
      flex: 1;
      min-width: 112px;
    }

    .list-row,
    .mgmt-row {
      display: block;
      width: 100%;
      text-align: right;
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      border-radius: 0;
      padding: 0;
      min-height: 66px;
      box-shadow: none;
    }

    .list-row {
      position: relative;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      min-height: 68px;
    }

    .list-row-content {
      padding: 10px 18px 10px 58px;
      min-height: 68px;
    }

    .list-row.completed .list-row-content {
      padding-left: 18px;
    }

    .row-meta {
      display: flex;
      gap: 7px 10px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .86rem;
      margin-top: 4px;
      line-height: var(--leading-body);
    }

    .row-meta .person-line,
    .row-meta .due {
      margin: 0;
      font-size: .88rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .priority-meta.high {
      color: color-mix(in srgb, var(--danger) 78%, var(--muted));
      font-weight: 620;
    }

    .age-meta {
      color: var(--muted);
      font-size: .86rem;
    }

    .due.overdue {
      color: color-mix(in srgb, var(--danger) 58%, var(--muted));
      font-weight: 650;
    }

    .list-row .task-title {
      margin: 2px 0 3px;
      font-size: 1rem;
      font-weight: var(--weight-emphasis);
      line-height: var(--leading-tight);
    }

    .complete-row {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 48px;
      min-height: 100%;
      padding: 0;
      border: 0;
      border-right: 1px solid color-mix(in srgb, var(--status-done) 34%, var(--line));
      border-radius: 0;
      color: var(--status-done);
      background: color-mix(in srgb, var(--status-done) 13%, var(--surface));
      font-weight: 650;
      z-index: 2;
      display: grid;
      place-content: center;
    }

    .complete-row .line-icon {
      width: 20px;
      height: 20px;
      margin-inline: auto;
    }

    .complete-label {
      display: block;
      line-height: 1.12;
    }

    .supplier-list-row {
      cursor: default;
    }

    .supplier-created-notice {
      margin: 0 18px 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--accent) 10%, var(--surface));
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--line));
      color: var(--accent);
      font-size: .9rem;
      font-weight: var(--weight-emphasis);
    }

    .supplier-list-row.is-new .list-row-content {
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
      border-inline-start: 3px solid var(--accent);
    }

    .supplier-list-row .list-row-content {
      padding: 10px 14px;
      min-width: 0;
      cursor: pointer;
    }

    .supplier-card-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .supplier-card-head .task-title {
      flex: 1;
      min-width: 0;
    }

    .supplier-steps-toggle {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid color-mix(in srgb, var(--line) 88%, transparent);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .supplier-steps-toggle .line-icon {
      width: 14px;
      height: 14px;
      transition: transform .18s ease;
    }

    .supplier-list-row.is-steps-open .supplier-steps-toggle .line-icon {
      transform: rotate(180deg);
    }

    .supplier-steps-panel {
      display: none;
      margin-top: 8px;
    }

    .supplier-list-row.is-steps-open .supplier-steps-panel {
      display: block;
    }

    .supplier-steps {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .supplier-step {
      --step-color: var(--accent);
      position: relative;
      overflow: hidden;
      min-height: 52px;
      min-width: 0;
      padding: .38rem .28rem;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--step-color) 20%, var(--line));
      background: color-mix(in srgb, var(--step-color) 7%, var(--surface));
      color: var(--muted);
      font-size: .72rem;
      font-weight: 700;
      text-align: center;
      box-shadow: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      line-height: 1.15;
    }

    .supplier-step::before,
    .supplier-check::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--step-color);
      opacity: .72;
    }

    .supplier-step.done {
      border-color: color-mix(in srgb, var(--step-color) 44%, var(--line));
      background: color-mix(in srgb, var(--step-color) 13%, var(--surface));
      color: color-mix(in srgb, var(--step-color) 80%, var(--text));
    }

    .step-order {
      --step-color: var(--soft-blue);
    }

    .step-received {
      --step-color: var(--sand);
    }

    .step-payment {
      --step-color: var(--status-progress);
    }

    .step-invoice {
      --step-color: var(--status-done);
    }

    .supplier-step small,
    .supplier-step-date {
      display: block;
      color: inherit;
      font-size: .64rem;
      font-weight: 540;
      line-height: 1.15;
      word-break: break-word;
    }

    .supplier-step-label {
      display: block;
      line-height: 1.15;
      word-break: break-word;
    }

    .supplier-checklist {
      display: grid;
      gap: 8px;
    }

    .supplier-checklist--stack {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      border-top: 1px solid var(--line);
    }

    .supplier-checklist--stack .supplier-check {
      width: 100%;
      min-height: 42px;
      padding: .55rem .85rem;
      padding-inline-start: calc(.85rem + 6px);
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      justify-content: flex-start;
    }

    .supplier-checklist--stack .supplier-check:last-child {
      border-bottom: 0;
    }

    .supplier-checklist--stack .supplier-check::before {
      inset: 0 auto 0 0;
      inset-inline-start: 0;
      width: 4px;
      height: auto;
      opacity: 1;
    }

    .supplier-check {
      --step-color: var(--accent);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 46px;
      padding: .65rem .78rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 76%, transparent);
      box-shadow: none;
      cursor: pointer;
    }

    .supplier-check.done {
      border-color: color-mix(in srgb, var(--step-color) 42%, var(--line));
      color: color-mix(in srgb, var(--step-color) 82%, var(--text));
      background: color-mix(in srgb, var(--step-color) 9%, var(--surface));
    }

    .supplier-check.step-order {
      --step-color: var(--soft-blue);
    }

    .supplier-check.step-received {
      --step-color: var(--sand);
    }

    .supplier-check.step-payment {
      --step-color: var(--status-progress);
    }

    .supplier-check.step-invoice {
      --step-color: var(--status-done);
    }

    .supplier-check-text {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35rem 1rem;
      line-height: 1.25;
    }

    .supplier-check-text strong {
      flex-shrink: 0;
    }

    .supplier-check-date {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 500;
      flex-shrink: 0;
      padding-inline-start: 0.35rem;
    }

    .supplier-checklist .supplier-check {
      min-height: 40px;
      padding: .5rem .78rem;
    }

        preferences: '<path d="M4 7h16"/><path d="M7 7a2 2 0 1 0 0 .01"/><path d="M4 17h16"/><path d="M17 17a2 2 0 1 0 0 .01"/>',

      return `<span class="icon-label">${lineIcon(name)}<span>${text}</span></span>`;
    }
    // helpers משותפים מה-bundle — מקור יחיד, בלי כפילות inline
    if (!BatAyinAdapters?.createSupabaseTasksAdapter || !BatAyinAdapters?.createSupabaseSuppliersAdapter || !BatAyinAdapters?.createSupabaseOrgMembersAdapter) {
      throw new Error("Adapters bundle failed to load.");
    }
    const {
      normalizeTask,
      normalizeSupplier,
      defaultTaskReminder,
      isoDateFromOffset,
      toIsoDateOnly,
      startOfToday,
      dateFromIso,
      daysFromTodayIso,
      daysBetween,
      createAsyncRepository,
      createSupabaseTasksAdapter,
      createSupabaseSuppliersAdapter,
      createSupabaseOrgMembersAdapter,
      createLocalTasksAdapter,
      createLocalSuppliersAdapter,
      createLocalOrgMembersAdapter,
      BASE_CATEGORIES: baseCategories,
      BASE_PEOPLE: basePeople,
      loadCategories,
      loadPeople,
      readCustomCategories,
      readHiddenCategoryIds,
      saveCustomCategories,
      saveHiddenCategoryIds,
      readCustomPeople,
      readHiddenPeople,
      saveCustomPeople,
      saveHiddenPeople,

      SUPPLIER_STEPS: supplierSteps,

      sortOrgMembers,
      countActiveManagers,
      isLastActiveManager,
      lastManagerBlockReason,
      personalOwner: personalOwnerDomain,
      PILOT_APP_URL,
      getPilotOAuthRedirectUrl,
      PILOT_SUPABASE_URL,
      PILOT_SUPABASE_ANON_KEY,
      isSupabasePlaceholder,
      resolvePilotDataBackend,
      isPilotDebugEnabled,
      loadPilotAuthContext,
      migrateLocalPilotData,
      DEMO_USER_OWNER,
      DEMO_MANAGER_OWNER
    } = BatAyinAdapters;
    let categories = [];
    let people = [];
    const statusMeta = {
      progress: { label: "בתהליך", dot: "progress", icon: "progress" },
      done: { label: "הושלם", dot: "done", icon: "done" }
    };
    const statusButtons = [
      ["progress", "בתהליך"],
      ["done", "הושלם"]
    ];
    const priorityButtons = [
      ["normal", "רגילה"],
      ["high", "גבוהה"]
    ];
    const params = new URLSearchParams(location.search);
    const DATA_BACKEND = resolvePilotDataBackend(params);
    const PILOT_DEBUG = isPilotDebugEnabled(params);
    // כתובת OAuth — קבועה מ-pilotConfig (לא window.location.origin)
    const OAUTH_REDIRECT_URL = getPilotOAuthRedirectUrl();
    if (PILOT_DEBUG) {
      console.warn("[pilot-debug] debug mode enabled.");
    }
    if (DATA_BACKEND === "local") {
      console.warn("[pilot-debug] DATA_BACKEND=local — localStorage only.");
      people = loadPeople();
      categories = loadCategories();
    }
    const repositoryAdapters = {};

    function createSupabaseClientSafe() {
      try {
        if (isSupabasePlaceholder(PILOT_SUPABASE_URL) || isSupabasePlaceholder(PILOT_SUPABASE_ANON_KEY)) {
          return null;
        }
        if (!window.supabase || typeof window.supabase.createClient !== "function") {
          console.warn("Supabase client library is not available.");
          return null;
        }
        return window.supabase.createClient(PILOT_SUPABASE_URL, PILOT_SUPABASE_ANON_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            flowType: "pkce",
            redirectTo: OAUTH_REDIRECT_URL
          }
        });
      } catch (error) {
        console.warn("Supabase client initialization failed.", error);
        return null;
      }
    }
    const supabaseClient = createSupabaseClientSafe();
    async function testSupabaseConnection() {
      try {
        if (!supabaseClient) {
          return { ok: false, reason: "Supabase is not configured." };
        }
        const { error } = await supabaseClient.schema("bat_ayin").from("tasks").select("id").limit(1);
        if (error) {
          console.warn("Supabase connection test failed.", error);
          return { ok: false, error };
        }
        return { ok: true };
      } catch (error) {
        console.warn("Supabase connection test failed.", error);
        return { ok: false, error };
      }
    }
    if (PILOT_DEBUG) {
      window.testSupabaseConnection = testSupabaseConnection;
    }

    function debugAuthTrace(step, detail) {
      console.warn(`[debug][auth][${step}]`, detail);
      return detail;
    }
    function restoreDebugBackendQuery(query) {
      if (DATA_BACKEND === "local") query.set("debugBackend", "local");
      return query;
    }
    function getDebugSupabaseRedirectUrl() {
      return getPilotOAuthRedirectUrl();
    }
    function isSupabaseOAuthCallbackUrl() {
      const query = new URLSearchParams(window.location.search);
      if (query.get("code")) return true;
      const hash = window.location.hash.replace(/^#/, "");
      return hash.includes("access_token=") || hash.includes("error=") || hash.includes("error_description=");
    }
    function readSupabaseAuthCallbackUrl() {
      const query = new URLSearchParams(window.location.search);
      const hash = window.location.hash.replace(/^#/, "");
      return {
        href: window.location.href,
        code: query.get("code"),
        state: query.get("state"),
        hash,
        isCallback: isSupabaseOAuthCallbackUrl()
      };
    }
    function cleanOAuthCallbackUrl() {
      const query = new URLSearchParams(window.location.search);
      query.delete("code");
      query.delete("state");
      restoreDebugBackendQuery(query);
      const search = query.toString();
      window.history.replaceState({}, document.title, `${window.location.pathname}${search ? `?${search}` : ""}`);
    }
    async function unregisterServiceWorkersForAuth() {
      if (!("serviceWorker" in navigator)) return;
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map((reg) => reg.unregister()));
    }
    async function consumeSupabaseOAuthCallback() {
      const callbackUrl = readSupabaseAuthCallbackUrl();
      debugAuthTrace("3-callback-url", callbackUrl);
      if (!supabaseClient || !callbackUrl.isCallback) {
        return debugAuthTrace("3-consume-skip", { ok: true, consumed: false, reason: "no oauth callback in url" });

        if (task.status === "done") continue;
        const id = task.category || "uncategorized";

        const fallbackOwner = people[0] || personalOwner() || "ללא מבצע";
        state.tasks = await tasksRepository.saveTasks(state.tasks.map(t => names.includes(t.owner) ? { ...t, owner: fallbackOwner } : t));
        state.deletingPerson = false;
        state.peopleToDelete = [];
        await save();
        render();
        toast(names.length === 1 ? "המבצע נמחק" : "המבצעים נמחקו");
      });
      function openTaskDueDatePicker() {
        const dateInput = $("newDate");
        if (!dateInput) return;
        if (typeof dateInput.showPicker === "function") dateInput.showPicker();
        else dateInput.focus();
      }
      document.querySelectorAll("[data-due-choice]").forEach(btn => btn.addEventListener("click", e => {
        document.querySelectorAll("[data-due-choice]").forEach(b => b.classList.remove("active"));
        e.currentTarget.classList.add("active");
        const dateInput = $("newDate");
        const choice = e.currentTarget.dataset.dueChoice;
        const dateBtn = document.querySelector('[data-due-choice="date"]');
        if (choice === "date") {
          dateInput.required = true;
          openTaskDueDatePicker();
        } else {
          dateInput.required = false;
          dateInput.value = "";
          if (dateBtn) dateBtn.textContent = "בחר תאריך";
        }
      }));
      $("newDate")?.addEventListener("change", e => {
        const dateBtn = document.querySelector('[data-due-choice="date"]');
        if (dateBtn && e.currentTarget.value) {
          dateBtn.textContent = formatHebrewDate(e.currentTarget.value);
          document.querySelectorAll("[data-due-choice]").forEach(b => b.classList.remove("active"));
          dateBtn.classList.add("active");
        }
      });
      $("createForm")?.addEventListener("submit", async (e) => {
        e.preventDefault();
        const form = e.currentTarget;
        const owner = resolveTaskOwner(form);
        const dueChoice = document.querySelector("[data-due-choice].active").dataset.dueChoice;
        if (dueChoice === "date" && !$("newDate").value) {
          openTaskDueDatePicker();
          toast("בחר תאריך");
          return;
        }
        const dueDate = dueChoice === "today" ? isoDateFromOffset(0) : dueChoice === "tomorrow" ? isoDateFromOffset(1) : dueChoice === "date" ? $("newDate").value : null;
        const dueLabel = dueDate ? taskDueLabel({ due_date: dueDate, status: "progress" }) : "ללא יעד";
        const task = {
          id: `t${Date.now()}`,
          title: $("newTitle").value,
          category: form.category?.value || "uncategorized",
          owner,
          due: dueChoice,
          due_date: dueDate,
          dueLabel,
          status: "progress",
          priority: form.priority?.value || "normal",
          created_at: isoDateFromOffset(0),
          createdLabel: formatHebrewDate(isoDateFromOffset(0)),
          completed_at: null,
          deleted_at: null,
          deleted_by: null,
          reminder: {
            enabled: Boolean(dueDate),
            timing: "before_due",
            amount: 1,
            unit: "day"
          },
          notes: $("newNotes").value,
          updates: []
        };
        await createTask(task);
        const created = state.tasks.find(item => item.title === task.title && item.owner === owner) || state.tasks[0];
        toast("המשימה נוצרה");
        navigate(`task:${created?.id || task.id}`);
      });
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[ch]));
    }
    function renderLinkedText(text) {
      return escapeHtml(text).replace(/\bhttps?:\/\/[^\s<]+/g, (match) => {
        let url = match;
        let suffix = "";
        while (/[),.;:!?]$/.test(url)) {
          suffix = `${url.slice(-1)}${suffix}`;
          url = url.slice(0, -1);
        }
        try {
          new URL(url.replace(/&amp;/g, "&"));
        } catch {
          return match;
        }
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>${suffix}`;
      });
    }
    window.addEventListener("hashchange", () => {
      navigate(location.hash.replace("#", "") || defaultRoute());
    });
    let authListenerReady = false;
    function registerPilotAuthListener() {
      if (!supabaseClient || authListenerReady || DATA_BACKEND !== "supabase") return;
      authListenerReady = true;
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (PILOT_DEBUG) console.warn("[pilot] auth event:", event, session?.user?.email || "none");
        if (event === "SIGNED_IN" && session) {
          await refreshPilotAuth();
          if (state.authStatus === "ready") {
            if (state.role === "manager") {
              const migration = await migrateLocalPilotData({
                isManager: true,
                tasksRepository,
                suppliersRepository
              });
              if (migration.migratedTasks || migration.migratedSuppliers) {
                toast(`הועברו ${migration.migratedTasks} משימות ו-${migration.migratedSuppliers} הזמנות`);
              }
            }
            await bootstrapSuppliers();
            await bootstrapTasks();
          }
          render();
        }
        if (event === "SIGNED_OUT") {
          applyPilotAuthContext({ status: "signed_out", role: "user", userId: "", email: "", displayName: "", orgPeople: [] });
          state.tasks = [];
          state.suppliers = [];
          render();
        }
      });
    }
    async function initRuntime() {
      await window.__authBoot;
      // ניקוי SW ישן מביקורים קודמים — גם בדפדפן רגיל (לא רק PWA)
      if (DATA_BACKEND === "supabase") {
        await unregisterServiceWorkersForAuth();
      }
      updateOfflineBanner();
      initConfirmDialog();
      window.addEventListener("online", updateOfflineBanner);
      window.addEventListener("offline", updateOfflineBanner);

      if (DATA_BACKEND === "local") {
        people = loadPeople();
        categories = loadCategories();
        registerPilotAuthListener();
        await bootstrapSuppliers();
        await bootstrapTasks();
        registerServiceWorker();
        return;
      }

      const consumeResult = await consumeSupabaseOAuthCallback();
      await refreshPilotAuth();

      if (consumeResult.consumed && state.authStatus !== "ready") {
        toast("התחברות נכשלה — נסו שוב");
      }

      if (state.authStatus === "ready") {
        if (!location.hash || isSupabaseOAuthCallbackUrl()) {
          location.hash = defaultRoute();
        }
        state.view = location.hash.replace("#", "") || defaultRoute();
        if (state.view === "done") state.showCompletedTasks = true;
        if (state.role === "manager") {
          const migration = await migrateLocalPilotData({
            isManager: true,
            tasksRepository,
            suppliersRepository
          });
          if (migration.migratedTasks || migration.migratedSuppliers) {
            toast(`הועברו ${migration.migratedTasks} משימות ו-${migration.migratedSuppliers} הזמנות מהמכשיר`);
          } else if (!migration.ok && migration.reason) {
            console.warn("Migration skipped/failed.", migration.reason);
          }
        }
        registerPilotAuthListener();
        await bootstrapSuppliers();
        await bootstrapTasks();
        registerServiceWorker();
        render();
      } else {
        render();
      }
    }

    // hooks ל-validation-harness.js — לא משנה runtime רגיל
    window.__validationHooks = {
      localTasksAdapter,
      localSuppliersAdapter,
      localOrgMembersAdapter,
      supplierAdapter,
      orgMembersAdapter,
      tasksRepository,
      suppliersRepository,
      orgMembersRepository,
      state,
      isoDateFromOffset,
      toIsoDateOnly,
      supplierSteps,
      canAccessTask,
      canEditTaskContent,
      canDeleteTask,
      canAccessSupplier,
      canAccessOrgAdmin,
      canPromoteMember,
      canDemoteMember,
      canDeactivateMember,
      canReactivateMember,
      countActiveManagers,
      isLastActiveManager,
      lastManagerBlockReason,
      findOrgMember,
      sortOrgMembers,
      orgMemberRoleLabel,
      accessCtx,
      isArchivedDone,
      visibleDoneTasks,
      activeTasks,
      DATA_BACKEND,
      supabaseClient,
      bootstrapTasks,
      bootstrapSuppliers,
      loadSuppliers,
      render,
      guardManagerAdminView,
      parentRoute,
      backRouteFor,
      navigate,
      mgmtVisibleCategoryTasks,
      buildMgmtCategoryRows
    };
    window.__appReady = Promise.all([
      initRuntime(),
      (function loadValidationHarnessIfNeeded() {
        const harnessParams = new URLSearchParams(location.search);
        if (
          harnessParams.get("debug") !== "1"
          && harnessParams.get("debugBackend") !== "local"
          && harnessParams.get("debugBackend") !== "supabase"
        ) {
          window.__validation = {
            ready: true,
            runAll: async () => [],
            runSuite: async () => ({ suite: "stub", ok: true, steps: [], failed: [] })
          };
          return Promise.resolve();
        }
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "./validation-harness.js";
          script.onload = resolve;
          script.onerror = () => reject(new Error("validation-harness.js failed to load"));
          document.body.appendChild(script);
        });
      })()
    ]);
    let serviceWorkerRegistered = false;
    let swReloadScheduled = false;
    function registerServiceWorker() {
      if (serviceWorkerRegistered || !("serviceWorker" in navigator)) return;
      serviceWorkerRegistered = true;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swReloadScheduled) return;
        swReloadScheduled = true;
        window.location.reload();
      });
      navigator.serviceWorker.register("./service-worker.js").then((registration) => {
        registration.addEventListener("updatefound", () => {
          const worker = registration.installing;
          if (!worker) return;
          worker.addEventListener("statechange", () => {
            if (worker.state === "installed" && navigator.serviceWorker.controller) {
              worker.postMessage({ type: "SKIP_WAITING" });
            }
          });
        });
        if (navigator.serviceWorker.controller) {
          registration.update();
        }
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") registration.update();
        });
      }).catch(() => { });
    }
  </script>
