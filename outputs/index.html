<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#566B4F">
  <meta name="background-color" content="#F7F3EA">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="משימות ישיבה">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>משימות ישיבת בת עין</title>
  <style>
    :root {
      --bg: #F7F3EA;
      --surface: #FFFDF8;
      --surface-strong: #F2E8D8;
      --text: #2E2A24;
      --muted: #7A746A;
      --line: #E4DCCF;
      --accent: #566B4F;
      --accent-soft: #E8EDE2;
      --sand: #CDBB9D;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
      --outer-shell: #EAE4D8;
      --radius: 12px;
      font-family: "Heebo", "Assistant", "Rubik", "Noto Sans Hebrew", "Segoe UI", Arial, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #2F332F;
      --surface: #3A3F3A;
      --surface-strong: #444A44;
      --text: #ECE7DD;
      --muted: #B8B0A3;
      --line: rgba(255,255,255,.06);
      --accent: #A7F070;
      --accent-soft: rgba(167,240,112,.12);
      --sand: #8E7B5F;
      --outer-shell: #252A25;
      --danger: #B85C50;
      --status-progress: #C7893A;
      --status-done: #6F8A5E;
      --soft-blue: #6F8FA3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--outer-shell);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 0;
    }
    [data-theme="dark"] body, body[data-theme="dark"] {
      background: var(--outer-shell);
    }
    button, input, textarea {
      font: inherit;
      color: inherit;
    }
    button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #FFFDF8 0%, #F3EEE5 100%);
      border-radius: 12px;
      padding: .78rem 1rem;
      cursor: pointer;
      min-height: 46px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.72), 0 2px 8px rgba(0,0,0,.035);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease;
    }
    button:hover {
      border-color: color-mix(in srgb, var(--sand) 68%, var(--line));
    }
    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 1px 2px rgba(46,42,36,.08);
    }
    button.primary {
      background: linear-gradient(180deg, #6D8264 0%, #566B4F 100%);
      color: white;
      border-color: var(--accent);
      font-weight: 750;
    }
    button.soft {
      background: linear-gradient(180deg, #F4F6EF 0%, var(--accent-soft) 100%);
      border-color: color-mix(in srgb, var(--accent) 22%, var(--line));
      color: var(--accent);
      font-weight: 700;
    }
    button.icon {
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      padding: .85rem;
      outline-color: var(--accent);
      box-shadow: inset 0 1px 2px rgba(46,42,36,.035);
    }
    textarea { min-height: 110px; resize: vertical; }
    .app-shell {
      width: min(calc(100% - 28px), 430px);
      margin: 0 auto;
      min-height: calc(100vh - 36px);
      padding: 18px 16px 112px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,0) 160px),
        linear-gradient(rgba(120,110,90,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,110,90,.04) 1px, transparent 1px),
        var(--surface);
      background-size: auto, 28px 28px, 28px 28px, auto;
      border: 1px solid color-mix(in srgb, var(--sand) 42%, var(--line));
      border-radius: 28px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.75),
        inset 0 0 0 8px rgba(234,228,216,.42),
        0 2px 8px rgba(0,0,0,.04);
      overflow: hidden;
      position: relative;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 8;
      margin: -18px -16px 18px;
      padding: 14px 18px 12px;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--surface-strong) 46%, var(--surface));
      border-bottom: 1px solid color-mix(in srgb, var(--line) 92%, var(--sand));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.58), 0 8px 16px -16px rgba(46,42,36,.34);
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      min-width: 0;
    }
    .brand strong { font-size: .98rem; }
    .brand span { color: var(--muted); font-size: .8rem; }
    .mockup-notice {
      margin: -8px 0 14px;
      padding: 7px 10px;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 9px;
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      color: var(--muted);
      font-size: .76rem;
      line-height: 1.35;
      text-align: center;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(1.65rem, 4.5vw, 2.15rem); letter-spacing: 0; font-weight: 760; }
    h2 { font-size: 1.08rem; margin-bottom: .75rem; font-weight: 720; }
    h3 { font-size: 1rem; margin-bottom: .48rem; }
    .muted { color: var(--muted); }
    .hero {
      padding: 22px 2px 16px;
    }
    .screen-title {
      color: var(--muted);
      font-size: .92rem;
      font-weight: 740;
      line-height: 1.25;
    }
    .screen-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.35;
    }
    .hero .count {
      margin-top: 14px;
      width: 74px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      color: var(--accent);
      font-size: 2.1rem;
      font-weight: 760;
    }
    .section {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .task-group {
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }
    .task-group-title {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .list-group {
      padding-top: 10px;
    }
    .list-group + .list-group {
      margin-top: 18px;
    }
    .list-group-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 18px 8px;
      color: var(--muted);
      font-size: .92rem;
      font-weight: 720;
    }
    .list-group-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: color-mix(in srgb, var(--line) 82%, transparent);
    }
    .task-group.highlight {
      border-top: 2px solid var(--sand);
    }
    .cards, .list, .mgmt-list {
      display: grid;
      gap: 8px;
    }
    .task-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      text-align: right;
      box-shadow: 0 2px 8px rgba(0,0,0,.035);
    }
    .task-card header, .list-row header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .category, .status-line, .person-line {
      color: var(--muted);
      font-size: .95rem;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .status-badge {
      display: inline-flex;
      width: fit-content;
      padding: .28rem .55rem;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface-strong) 45%, var(--surface));
      color: var(--muted);
      font-size: .82rem;
      font-weight: 560;
    }
    .task-title {
      font-size: 1.04rem;
      font-weight: 760;
      margin: 8px 0;
    }
    .due {
      color: var(--muted);
      margin: 4px 0 0;
      font-size: .9rem;
    }
    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-actions button { flex: 1; min-width: 112px; }
    .list-row, .mgmt-row {
      display: block;
      width: 100%;
      text-align: right;
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
      border-radius: 0;
      padding: 0;
      min-height: 66px;
      box-shadow: none;
    }
    .list-row {
      position: relative;
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      min-height: 68px;
    }
    .list-row-content {
      padding: 8px 18px 8px 92px;
      min-height: 68px;
    }
    .list-row.completed .list-row-content {
      padding-left: 18px;
    }
    .row-meta {
      display: flex;
      gap: 7px 10px;
      align-items: center;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: .88rem;
      margin-top: 3px;
      line-height: 1.4;
    }
    .row-meta .person-line,
    .row-meta .due {
      margin: 0;
      font-size: .88rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .priority-meta.high {
      color: color-mix(in srgb, var(--danger) 78%, var(--muted));
      font-weight: 620;
    }
    .age-meta {
      color: var(--muted);
      font-size: .86rem;
    }
    .due.overdue {
      color: color-mix(in srgb, var(--danger) 58%, var(--muted));
      font-weight: 650;
    }
    .list-row .task-title {
      margin: 1px 0 2px;
      font-size: 1rem;
    }
    .complete-row {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 82px;
      min-height: 100%;
      padding: .45rem .3rem;
      border: 0;
      border-right: 1px solid color-mix(in srgb, var(--status-done) 34%, var(--line));
      border-radius: 0;
      color: var(--status-done);
      background: color-mix(in srgb, var(--status-done) 13%, var(--surface));
      font-weight: 650;
      font-size: .78rem;
      line-height: 1.12;
      text-align: center;
      white-space: normal;
      z-index: 2;
      display: grid;
      place-content: center;
      gap: 5px;
      box-shadow: inset 1px 0 0 rgba(255,255,255,.42);
    }
    .complete-row .line-icon {
      width: 17px;
      height: 17px;
      margin-inline: auto;
    }
    .complete-label {
      display: block;
      line-height: 1.12;
    }
    .supplier-progress {
      display: grid;
      gap: 7px;
      margin-top: 8px;
    }
    .supplier-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
    }
    .supplier-step {
      --step-color: var(--accent);
      position: relative;
      overflow: hidden;
      min-height: 38px;
      padding: .42rem .35rem;
      border-radius: 10px;
      border: 1px solid color-mix(in srgb, var(--step-color) 20%, var(--line));
      background: color-mix(in srgb, var(--step-color) 7%, var(--surface));
      color: var(--muted);
      font-size: .78rem;
      font-weight: 700;
      text-align: center;
      box-shadow: none;
    }
    .supplier-step::before,
    .supplier-check::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: var(--step-color);
      opacity: .72;
    }
    .supplier-step.done {
      border-color: color-mix(in srgb, var(--step-color) 44%, var(--line));
      background: color-mix(in srgb, var(--step-color) 13%, var(--surface));
      color: color-mix(in srgb, var(--step-color) 80%, var(--text));
    }
    .step-order { --step-color: var(--soft-blue); }
    .step-received { --step-color: var(--sand); }
    .step-payment { --step-color: var(--status-progress); }
    .step-invoice { --step-color: var(--status-done); }
    .supplier-step small {
      color: inherit;
      font-weight: 540;
    }
    .supplier-checklist {
      display: grid;
      gap: 8px;
    }
    .supplier-check {
      --step-color: var(--accent);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 46px;
      padding: .65rem .78rem;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 76%, transparent);
      box-shadow: none;
      cursor: pointer;
    }
    .supplier-check.done {
      border-color: color-mix(in srgb, var(--step-color) 42%, var(--line));
      color: color-mix(in srgb, var(--step-color) 82%, var(--text));
      background: color-mix(in srgb, var(--step-color) 9%, var(--surface));
    }
    .supplier-check.step-order { --step-color: var(--soft-blue); }
    .supplier-check.step-received { --step-color: var(--sand); }
    .supplier-check.step-payment { --step-color: var(--status-progress); }
    .supplier-check.step-invoice { --step-color: var(--status-done); }
    .supplier-check-text {
      display: grid;
      gap: 2px;
    }
    .supplier-check-date {
      color: var(--muted);
      font-size: .82rem;
      font-weight: 500;
    }
    .supplier-step-date-input {
      width: 150px;
      min-width: 0;
      padding: .45rem .5rem;
      border-radius: 9px;
      font-size: .86rem;
    }
    .supplier-step-date-native {
      position: absolute;
      left: 12px;
      bottom: 8px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .supplier-check input[type="checkbox"],
    .supplier-assignee input {
      width: 16px;
      height: 16px;
      min-height: 0;
      margin: 0;
      accent-color: var(--accent);
      box-shadow: none;
    }
    .supplier-links {
      display: grid;
      gap: 6px;
    }
    .supplier-link-preview {
      margin-top: 8px;
    }
    .supplier-link {
      display: block;
      padding: .58rem .7rem;
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, var(--surface));
      overflow-wrap: anywhere;
    }
    .dot { font-size: .9rem; }
    .dot.progress { color: var(--status-progress); }
    .dot.done { color: var(--status-done); }
    .bottom-nav {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(calc(100% - 50px), 398px);
      display: grid;
      gap: 2px;
      padding: 8px 10px;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--line);
      border-inline: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,.65);
      z-index: 20;
    }
    .bottom-nav.manager { grid-template-columns: repeat(5, 1fr); }
    .bottom-nav.user { grid-template-columns: repeat(4, 1fr); }
    .bottom-nav button {
      border: 0;
      background: transparent;
      color: var(--muted);
      min-height: 54px;
      padding: 6px 3px;
      display: grid;
      place-items: center;
      gap: 2px;
      font-size: .74rem;
      border-radius: var(--radius);
    }
    .bottom-nav button span:first-child { line-height: 0; }
    .bottom-nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.42);
    }
    .detail-head {
      display: grid;
      gap: 10px;
      padding: 4px 0 16px;
      border-bottom: 1px solid var(--line);
    }
    .back {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border-color: transparent;
      padding-inline: 0;
      color: var(--muted);
    }
    .detail-title-row {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }
    .detail-title-row h1 {
      flex: 1;
      line-height: 1.2;
    }
    .detail-meta-strip {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
    }
    .detail-block {
      padding: 0;
      border-top: 1px solid var(--line);
    }
    .detail-panel {
      display: grid;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      box-shadow: 0 1px 4px rgba(0,0,0,.025);
      margin-top: 12px;
    }
    .detail-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }
    .detail-row:last-child {
      border-bottom: 0;
    }
    .detail-row h2 {
      margin: 0;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 720;
    }
    .detail-row-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .detail-row-main > p {
      line-height: 1.5;
    }
    .detail-row-main .segmented {
      margin-top: 0;
      gap: 6px;
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-radius: 11px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    .detail-row-main .segmented button {
      flex: 1;
      min-width: 78px;
      min-height: 34px;
      padding: .38rem .58rem;
      border-radius: 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 640;
      box-shadow: none;
    }
    .detail-row-main .segmented button.active {
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
      border-color: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .detail-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .detail-actions button {
      min-height: 34px;
      padding: .42rem .66rem;
      border-radius: 10px;
      font-size: .88rem;
      font-weight: 640;
      box-shadow: none;
    }
    .detail-edit-panel {
      display: grid;
      gap: 8px;
    }
    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .segmented button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    #createForm .segmented {
      gap: 6px;
      margin-top: 8px;
      padding: 3px;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-radius: 11px;
      background: color-mix(in srgb, var(--surface) 50%, transparent);
    }
    #createForm .segmented button {
      flex: 1;
      min-width: 82px;
      min-height: 34px;
      padding: .38rem .58rem;
      border-radius: 8px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 640;
      box-shadow: none;
    }
    #createForm .segmented button.active {
      background: color-mix(in srgb, var(--accent) 9%, var(--surface));
      border-color: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
    }
    .updates {
      display: grid;
      gap: 9px;
      margin-top: 10px;
    }
    .update-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .detail-row .update-item {
      background: color-mix(in srgb, var(--surface) 72%, transparent);
      box-shadow: none;
      padding: 10px 12px;
    }
    .update-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .update-meta {
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.35;
    }
    .update-edit {
      border: 0;
      background: transparent;
      box-shadow: none;
      min-height: 0;
      padding: 0;
      color: var(--accent);
      font-size: .84rem;
      font-weight: 700;
    }
    .update-edit-panel {
      display: grid;
      gap: 8px;
    }
    .update-edit-panel textarea {
      min-height: 84px;
    }
    .linked-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .linked-text a {
      color: var(--accent);
      text-decoration: underline;

      });
      $("saveEditedUpdate")?.addEventListener("click", () => {
        const id = state.view.split(":")[1];
        const t = getTask(id);
        const index = state.editingUpdateIndex;
        if (!canAccessTask(t)) {
          navigate("all");
          toast("אין הרשאה למשימה זו");
          return;
        }
        if (!Number.isInteger(index) || !t.updates[index]) {
          state.editingUpdateIndex = null;
          render();
          return;
        }
        const text = $("editUpdateInput").value.trim();
        if (!text) return toast("כתוב עדכון");
        const updates = t.updates.map((update, updateIndex) => updateIndex === index ? { ...update, text } : update);
        state.editingUpdateIndex = null;
        updateTask(id, { updates });
        toast("העדכון נשמר");
      });
      document.querySelectorAll("[data-theme-choice]").forEach(btn => btn.addEventListener("click", e => {
        state.prefs.dark = e.currentTarget.dataset.themeChoice === "dark";
        document.body.dataset.theme = state.prefs.dark ? "dark" : "";
        save();
        render();
      }));
      $("clearAllTasks")?.addEventListener("click", () => {
        if (state.clearAllStep < 2) {
          state.clearAllStep += 1;
          render();
          return;
        }
        state.tasks = [];
        state.clearAllStep = 0;
        save();
        render();
        toast("כל המשימות נמחקו");
      });
      $("showCategoryInput")?.addEventListener("click", () => {
        state.addingCategory = true;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      $("cancelCategory")?.addEventListener("click", () => {
        state.addingCategory = false;
        render();
      });
      $("saveCategory")?.addEventListener("click", () => {
        const name = $("newCategoryName").value.trim();
        if (!name) return toast("כתוב שם קטגוריה");
        const category = { id: `custom-${Date.now()}`, label: name, icon: "office" };
        const custom = safeArrayStorage("beit-categories");
        custom.push(category);
        localStorage.setItem("beit-categories", JSON.stringify(custom));
        categories = loadCategories();
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
        setTimeout(() => {
          const input = document.querySelector(`input[name="category"][value="${category.id}"]`);
          if (input) input.checked = true;
        }, 0);
        toast("הקטגוריה נוספה");
      });
      $("startDeleteCategory")?.addEventListener("click", () => {
        state.deletingCategory = !state.deletingCategory;
        state.categoriesToDelete = [];
        state.addingCategory = false;
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      document.querySelectorAll("[data-mark-delete-category]").forEach(btn => btn.addEventListener("click", e => {
        const id = e.currentTarget.dataset.markDeleteCategory;
        state.categoriesToDelete = state.categoriesToDelete.includes(id)
          ? state.categoriesToDelete.filter(categoryId => categoryId !== id)
          : [...state.categoriesToDelete, id];
        render();
      }));
      $("cancelDeleteCategory")?.addEventListener("click", () => {
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      $("confirmDeleteCategory")?.addEventListener("click", () => {
        const ids = state.categoriesToDelete;
        if (!ids.length) return;
        const hidden = safeArrayStorage("beit-hidden-categories");
        ids.filter(id => baseCategories.some(c => c.id === id)).forEach(id => {
          if (!hidden.includes(id)) hidden.push(id);
        });
        localStorage.setItem("beit-hidden-categories", JSON.stringify(hidden));
        const custom = safeArrayStorage("beit-categories").filter(c => !ids.includes(c.id));
        localStorage.setItem("beit-categories", JSON.stringify(custom));
        categories = loadCategories();
        const fallbackCategory = categories[0]?.id || "uncategorized";
        state.tasks = state.tasks.map(t => ids.includes(t.category) ? { ...t, category: fallbackCategory } : t);
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        save();
        render();
        toast(ids.length === 1 ? "הקטגוריה נמחקה" : "הקטגוריות נמחקו");
      });
      $("showPersonInput")?.addEventListener("click", () => {
        state.addingPerson = true;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      $("cancelPerson")?.addEventListener("click", () => {
        state.addingPerson = false;
        render();
      });
      $("savePerson")?.addEventListener("click", () => {
        const name = $("newPersonName").value.trim();
        if (!name) return toast("כתוב שם מבצע");
        const custom = safeArrayStorage("beit-people");
        if (![...basePeople, ...custom].includes(name)) custom.push(name);
        localStorage.setItem("beit-people", JSON.stringify(custom));
        people = loadPeople();
        state.addingPerson = false;
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
        setTimeout(() => {
          const input = document.querySelector(`input[name="owner"][value="${name}"]`);
          if (input) input.checked = true;
        }, 0);
        toast("המבצע נוסף");
      });
      $("startDeletePerson")?.addEventListener("click", () => {
        state.deletingPerson = !state.deletingPerson;
        state.peopleToDelete = [];
        state.addingPerson = false;
        state.addingCategory = false;
        state.deletingCategory = false;
        state.categoriesToDelete = [];
        render();
      });
      document.querySelectorAll("[data-mark-delete-person]").forEach(btn => btn.addEventListener("click", e => {
        const person = e.currentTarget.dataset.markDeletePerson;
        state.peopleToDelete = state.peopleToDelete.includes(person)
          ? state.peopleToDelete.filter(item => item !== person)
          : [...state.peopleToDelete, person];
        render();
      }));
      $("cancelDeletePerson")?.addEventListener("click", () => {
        state.deletingPerson = false;
        state.peopleToDelete = [];
        render();
      });
      $("confirmDeletePerson")?.addEventListener("click", () => {
        const names = state.peopleToDelete;
        if (!names.length) return;
        const hidden = safeArrayStorage("beit-hidden-people");
        names.filter(name => basePeople.includes(name)).forEach(name => {
          if (!hidden.includes(name)) hidden.push(name);
        });
        localStorage.setItem("beit-hidden-people", JSON.stringify(hidden));
        const custom = safeArrayStorage("beit-people").filter(name => !names.includes(name));
        localStorage.setItem("beit-people", JSON.stringify(custom));
        people = loadPeople();
        const fallbackOwner = people[0] || "ללא מבצע";
        state.tasks = state.tasks.map(t => names.includes(t.owner) ? { ...t, owner: fallbackOwner } : t);
        state.deletingPerson = false;
        state.peopleToDelete = [];
        save();
        render();
        toast(names.length === 1 ? "המבצע נמחק" : "המבצעים נמחקו");
      });
      document.querySelectorAll("[data-due-choice]").forEach(btn => btn.addEventListener("click", e => {
        document.querySelectorAll("[data-due-choice]").forEach(b => b.classList.remove("active"));
        e.currentTarget.classList.add("active");
        const dateInput = $("newDate");
        const dateMode = e.currentTarget.dataset.dueChoice === "date";
        dateInput.style.display = dateMode ? "block" : "none";
        dateInput.required = dateMode;
      }));
      $("createForm")?.addEventListener("submit", e => {
        e.preventDefault();
        const form = e.currentTarget;
        const owner = state.role === "manager" ? (form.owner?.value || people[0] || "ללא מבצע") : "עדינה";
        const dueChoice = document.querySelector("[data-due-choice].active").dataset.dueChoice;
        if (dueChoice === "date" && !$("newDate").value) {
          $("newDate").focus();
          toast("בחר תאריך");
          return;
        }
        const dueDate = dueChoice === "today" ? isoDateFromOffset(0) : dueChoice === "tomorrow" ? isoDateFromOffset(1) : dueChoice === "date" ? $("newDate").value : null;
        const dueLabel = dueDate ? taskDueLabel({ due_date: dueDate, status: "progress" }) : "ללא יעד";
        const task = {
          id: `t${Date.now()}`,
          title: $("newTitle").value,
          category: form.category?.value || "uncategorized",
          owner,
          due: dueChoice,
          due_date: dueDate,
          dueLabel,
          status: "progress",
          priority: form.priority?.value || "normal",
          created_at: isoDateFromOffset(0),
          createdLabel: formatHebrewDate(isoDateFromOffset(0)),
          notes: $("newNotes").value,
          updates: []
        };
        state.tasks = [task, ...state.tasks];
        save();
        toast("המשימה נוצרה");
        navigate(`task:${task.id}`);
      });
    }
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[ch]));
    }
    function renderLinkedText(text) {
      return escapeHtml(text).replace(/\bhttps?:\/\/[^\s<]+/g, (match) => {
        let url = match;
        let suffix = "";
        while (/[),.;:!?]$/.test(url)) {
          suffix = `${url.slice(-1)}${suffix}`;
          url = url.slice(0, -1);
        }
        try {
          new URL(url.replace(/&amp;/g, "&"));
        } catch {
          return match;
        }
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>${suffix}`;
      });
    }
    window.addEventListener("hashchange", () => {
      state.view = location.hash.replace("#", "") || defaultRoute();
      render();
      resetScroll();
    });
    if (!location.hash) location.hash = defaultRoute();
    render();

    function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      navigator.serviceWorker.register("./service-worker.js").then((registration) => {
        registration.addEventListener("updatefound", () => {
          const worker = registration.installing;
          if (!worker) return;
          worker.addEventListener("statechange", () => {
            if (worker.state === "installed" && navigator.serviceWorker.controller) {
              worker.postMessage({ type: "SKIP_WAITING" });
            }
          });
        });
        if (navigator.serviceWorker.controller) {
          registration.update();
        }
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") registration.update();
        });
      }).catch(() => {});
    }
    registerServiceWorker();
  </script>
</body>
</html>
