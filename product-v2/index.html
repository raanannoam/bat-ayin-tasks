<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#4A5E44">
  <title>משימות ישיבת בת עין — Product V2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div class="app" id="appRoot">
    <header class="app-header" id="appHeader"></header>
    <main class="app-main" id="appMain" aria-live="polite"></main>
    <nav class="bottom-nav" id="bottomNav" aria-label="ניווט ראשי" hidden></nav>
    <button class="fab" id="fab" type="button" aria-label="יצירה" hidden>
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <dialog class="dialog" id="confirmDialog">
    <div class="dialog__body">
      <h2 id="dialogTitle">לאשר?</h2>
      <p class="muted small" id="dialogMessage"></p>
    </div>
    <div class="dialog__actions">
      <button type="button" id="dialogCancel">ביטול</button>
      <button type="button" id="dialogConfirm">אישור</button>
    </div>
  </dialog>

  <div class="toast" id="toast" role="status"></div>

  <script src="scripts/icons.js"></script>
  <script src="scripts/seed-data.js"></script>
  <script src="scripts/store.js"></script>
  <script src="scripts/render-shared.js"></script>
  <script src="scripts/screens-auth.js"></script>
  <script src="scripts/screens-today.js"></script>
  <script src="scripts/screens-tasks.js"></script>
  <script src="scripts/screens-suppliers.js"></script>
  <script src="scripts/screens-manage.js"></script>
  <script src="scripts/screens-settings.js"></script>
  <script src="scripts/router.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
